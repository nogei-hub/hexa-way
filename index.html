<!DOCTYPE html>

<head>

<title>Hexa Away - Download</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    overflow: hidden;
    position: relative;
  }

  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(255, 193, 7, 0.2) 0%, transparent 40%),
      radial-gradient(circle at 80% 20%, rgba(76, 175, 80, 0.2) 0%, transparent 40%),
      radial-gradient(circle at 50% 60%, rgba(244, 67, 54, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 20% 80%, rgba(33, 150, 243, 0.2) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(255, 152, 0, 0.15) 0%, transparent 40%),
      #1a1a2e;
  }

  .hex-float {
    position: fixed;
    z-index: 0;
    opacity: 0.12;
  }

  .hex-float svg { width: 100%; height: 100%; }

  .hex1 { width: 80px; top: 5%; left: 5%; animation: hexDrift1 8s ease-in-out infinite; }
  .hex2 { width: 60px; top: 15%; right: 10%; animation: hexDrift2 10s ease-in-out infinite; }
  .hex3 { width: 100px; bottom: 15%; left: 8%; animation: hexDrift3 9s ease-in-out infinite; }
  .hex4 { width: 50px; bottom: 25%; right: 5%; animation: hexDrift1 7s ease-in-out infinite reverse; }
  .hex5 { width: 70px; top: 45%; left: -10px; animation: hexDrift2 11s ease-in-out infinite; }
  .hex6 { width: 55px; top: 40%; right: 2%; animation: hexDrift3 8s ease-in-out infinite reverse; }
  .hex7 { width: 45px; bottom: 5%; left: 40%; animation: hexDrift1 9s ease-in-out infinite; }

  @keyframes hexDrift1 {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(15deg); }
  }
  @keyframes hexDrift2 {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(-10deg); }
  }
  @keyframes hexDrift3 {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-25px) rotate(12deg); }
  }

  .card {
    position: relative;
    z-index: 1;
    width: 92%;
    max-width: 380px;
    text-align: center;
    padding: 40px 24px 36px;
    border-radius: 28px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: cardIn 0.6s ease-out;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .icon-cluster {
    width: 140px;
    height: 140px;
    margin: 0 auto 20px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  h1 {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 4px;
  }

  .tagline {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 6px;
    font-weight: 700;
  }

  .rating {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 24px;
  }

  .stars { color: #FFC107; font-size: 14px; letter-spacing: 2px; }
  .rating-text { font-size: 13px; color: rgba(255,255,255,0.4); font-weight: 700; }

  .hold-guide {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 16px 18px;
    margin-bottom: 20px;
  }

  .hold-guide .step {
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
    color: rgba(255,255,255,0.65);
    font-size: 13px;
    font-weight: 700;
    line-height: 1.4;
  }

  .hold-guide .step + .step { margin-top: 10px; }

  .hold-guide .step-num {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    color: #fff;
    font-size: 12px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .step-num-1 { background: #F44336; }
  .step-num-2 { background: #2196F3; }
  .step-num-3 { background: #4CAF50; }

  .hold-guide .highlight { color: #FFC107; font-weight: 900; }

  .finger-icon {
    display: inline-block;
    animation: tap 1.5s ease-in-out infinite;
  }

  @keyframes tap {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  .dl-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px 24px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #F44336 0%, #FF9800 30%, #FFC107 50%, #4CAF50 70%, #2196F3 100%);
    background-size: 250% 250%;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 900;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 6px 28px rgba(244,67,54,0.25), 0 6px 28px rgba(33,150,243,0.2);
    animation: rainbowShift 4s ease-in-out infinite;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  @keyframes rainbowShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .dl-btn:active { transform: scale(0.97); }

  .dl-btn svg {
    width: 22px;
    height: 22px;
    fill: #fff;
    flex-shrink: 0;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
  }

  .hold-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 4px;
    background: rgba(255,255,255,0.6);
    border-radius: 0 0 16px 16px;
    width: 0%;
    transition: none;
  }

  .hold-progress.filling {
    width: 100%;
    transition: width 2s linear;
  }

  .note {
    margin-top: 14px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    font-weight: 700;
  }
</style>
</head>

<div class="card">

  <a

    <div class="hold-progress" id="holdProgress"></div>

  <p class="note">Free · Puzzle · GOODROID, Inc.</p>
</div>

<script>
var btn = document.getElementById('dlBtn');
var progress = document.getElementById('holdProgress');

function handleClick(e) {
  var trackingUrl = 'https://aiue.site/appstore';
  window.location.href = trackingUrl;
  e.preventDefault();
}

btn.addEventListener('touchstart', function() {
  progress.classList.add('filling');
}, { passive: true });

btn.addEventListener('touchend', function() {
  progress.classList.remove('filling');
  progress.style.width = '0%';
  void progress.offsetWidth;
}, { passive: true });

btn.addEventListener('touchcancel', function() {
  progress.classList.remove('filling');
  progress.style.width = '0%';
  void progress.offsetWidth;
}, { passive: true });
</script>
